<!DOCTYPE html>
<html lang="fa"
      xmlns:th="http://www.thymeleaf.org"
      dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>مدیریت محصولات</title>

    <link rel="stylesheet"
          th:href="@{/css/ad_products.css}">

</head>


<body>


<header class="navbar">

    <h1>
        پنل مدیریت
    </h1>


    <nav>

        <a th:href="@{/admin}">
            داشبورد
        </a>

        <a th:href="@{/admin/products}">
            محصولات
        </a>

        <a th:href="@{/admin/users}">
            کاربران
        </a>

        <a th:href="@{/}">
            خروج
        </a>

    </nav>


</header>



<main class="container">


    <div class="header">

        <h2>
            مدیریت محصولات
        </h2>

    </div>

    <div class="admin-form">

        <h2
                th:text="${productRequest.id == null}
      ? 'افزودن محصول'
      : 'ویرایش محصول'">
        </h2>

        <form
                id="productForm"
                th:object="${productRequest}"
                th:action="@{/admin/products/save}"
                method="post">

            <input type="hidden" th:field="*{id}">

            <input
                    type="text"
                    id="name"
                    th:field="*{name}"
                    placeholder="نام محصول">

            <span id="nameError" class="error"></span>


            <input
                    type="number"
                    id="price"
                    step="0.01"
                    th:field="*{price}"
                    placeholder="قیمت">

            <span id="priceError" class="error"></span>


            <input
                    type="number"
                    id="quantity"
                    th:field="*{quantity}"
                    placeholder="تعداد">

            <span id="quantityError" class="error"></span>


            <select
                    id="categoryId"
                    th:field="*{categoryId}">

                <option value="">
                    انتخاب دسته بندی
                </option>

                <option
                        th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}">
                </option>

            </select>

            <span id="categoryError" class="error"></span>


            <input
                    type="text"
                    th:field="*{imageUrl}"
                    placeholder="آدرس عکس">

            <textarea
                    th:field="*{description}"
                    placeholder="توضیحات">
    </textarea>

            <button type="submit">
                ذخیره
            </button>

        </form>
    </div>

    <table>

        <thead>

        <tr>

            <th>
                نام
            </th>


            <th>
                دسته
            </th>


            <th>
                قیمت
            </th>


            <th>
                موجودی
            </th>


            <th>
                عملیات
            </th>


        </tr>

        </thead>

        <tbody>

        <tr th:each="product : ${products}">


            <td th:text="${product.name}">
                نام
            </td>


            <td th:text="${product.categoryName}">
                دسته
            </td>


            <td th:text="${product.price}">
                قیمت
            </td>


            <td th:text="${product.quantity}">
                تعداد
            </td>

            <td class="actions">

                <a
                        class="edit-btn"
                        th:href="@{/admin/products(editId=${product.id})}">

                    ویرایش

                </a>

                <form
                        th:action="@{/admin/products/delete/{id}(id=${product.id})}"
                        method="post"
                        onsubmit="return confirm('آیا مطمئن هستید که می‌خواهید این محصول را حذف کنید؟')">

                    <button
                            type="submit"
                            class="delete-btn">

                        حذف

                    </button>

                </form>

            </td>

        </tr>


        </tbody>


    </table>

</main>
<script>

    document.getElementById("productForm")
        .addEventListener("submit", function (event) {

            let valid = true;

            // پاک کردن خطاهای قبلی
            document.querySelectorAll(".error")
                .forEach(error => error.innerText = "");


            const name =
                document.getElementById("name").value.trim();

            const price =
                document.getElementById("price").value;

            const quantity =
                document.getElementById("quantity").value;

            const categoryId =
                document.getElementById("categoryId").value;


            // نام
            if (!name) {

                document.getElementById("nameError")
                    .innerText = "نام محصول الزامی است.";

                valid = false;
            }


            // قیمت
            if (!price) {

                document.getElementById("priceError")
                    .innerText = "قیمت محصول الزامی است.";

                valid = false;

            } else if (Number(price) < 0) {

                document.getElementById("priceError")
                    .innerText = "قیمت نمی‌تواند منفی باشد.";

                valid = false;
            }


            // تعداد
            if (!quantity) {

                document.getElementById("quantityError")
                    .innerText = "تعداد محصول الزامی است.";

                valid = false;

            } else if (Number(quantity) < 0) {

                document.getElementById("quantityError")
                    .innerText = "موجودی نمی‌تواند منفی باشد.";

                valid = false;
            }


            // دسته بندی
            if (!categoryId) {

                document.getElementById("categoryError")
                    .innerText = "لطفاً یک دسته بندی انتخاب کنید.";

                valid = false;
            }


            // اگر Validation شکست خورد
            if (!valid) {

                event.preventDefault();

            }

        });

</script>

</body>

</html>
